<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <script>
      (function () {
        var resolved = 'light';
        try {
          var stored = localStorage.getItem('theme') || 'auto';
          resolved = stored;
          if (stored !== 'dark' && stored !== 'light') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        } catch (_) {
          resolved = 'light';
        }

        var root = document.documentElement;
        root.setAttribute('data-bs-theme', resolved);

        var isLight = resolved === 'light';
        var bg = isLight ? '#ffffff' : '#212529';
        var color = isLight ? '#37352f' : '#dee2e6';
        var bgRgb = isLight ? '255, 255, 255' : '33, 37, 41';

        root.style.setProperty('--bs-body-bg', bg, 'important');
        root.style.setProperty('--bs-body-bg-rgb', bgRgb, 'important');
        root.style.setProperty('--bs-body-color', color, 'important');
        root.style.backgroundColor = bg;
        root.style.color = color;
      })();
    </script>
    <style>
      html {
        color-scheme: light dark;
      }

      /* bootstrap·app.css 로드 전 첫 페인트 — DOS 파란 배경 FOUC 방지 */
      html[data-bs-theme='light'],
      html[data-bs-theme='light'] body {
        background-color: #ffffff !important;
        color: #37352f !important;
      }

      html[data-bs-theme='dark'],
      html[data-bs-theme='dark'] body {
        background-color: #212529 !important;
        color: #dee2e6 !important;
      }

      html[data-bs-theme='light'] {
        --bs-body-bg: #ffffff !important;
        --bs-body-bg-rgb: 255, 255, 255 !important;
        --bs-body-color: #37352f !important;
      }

      html[data-bs-theme='dark'] {
        --bs-body-bg: #212529 !important;
        --bs-body-bg-rgb: 33, 37, 41 !important;
        --bs-body-color: #dee2e6 !important;
      }
    </style>

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preload" href="%sveltekit.assets%/css/bootstrap.min.css?v=20260522" as="style" />
    <link rel="stylesheet" href="%sveltekit.assets%/css/bootstrap.min.css?v=20260522" />

    <link rel="shortcut icon" href="https://www.dgst.me/favicon/favicon.ico" type="image/x-icon" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/favicon/apple-icon-180x180.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%sveltekit.assets%/favicon/android-icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%sveltekit.assets%/favicon/favicon-32x32.png"
    />
    <link rel="manifest" href="%sveltekit.assets%/favicon/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="%sveltekit.assets%/favicon/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff" />

    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      />
    </noscript>

    <meta name="robots" content="noindex, nofollow" />
    <meta name="charset" content="UTF-8" />

    <title>dgst.me</title>

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
