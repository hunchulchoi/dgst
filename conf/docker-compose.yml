version: '3.9'
services:
  mongodb:
    image: mongo
    container_name: mongodb
    restart: unless-stopped
    networks:
      - dgst-mongo-net
    volumes:
      - dgst-mongo-vol:/data/db
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
  redis:
    image: redis:latest
    container_name: dgst_redis
    restart: unless-stopped
    networks:
      - dgst-svelte-net
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - dgst-redis-vol:/data
  postgres:
    image: postgres:18
    container_name: dgst_postgres
    restart: unless-stopped
    networks:
      - dgst-svelte-net
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=dgstdb
    volumes:
      - dgst-postgres-vol:/var/lib/postgresql/data
  dgst_svelte:
    image: dgst_svelte
    container_name: dgst_svelte
    build: .
    depends_on:
      - redis
    networks:
      - dgst-svelte-net
    volumes:
      - /Users/hunchulchoi/projects/volumes/dgst/uploads:/dgst/static/uploads
    ports:
      - '5173:4173'
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: 'true'
      BODY_SIZE_LIMIT: 100M
    env_file:
      - .env

networks:
  dgst-mongo-net:
  dgst-svelte-net:


volumes:
  dgst-mongo-vol:
  dgst-storage-vol:
  dgst-redis-vol:
  dgst-postgres-vol:
