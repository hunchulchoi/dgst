apiVersion: 1

# Grafana Alerting provisioning에서 datasourceUid 로 참조합니다.
# URL은 docker-compose / 환경에 맞게 수정하세요.
datasources:
  - name: Loki
    uid: loki-dgst
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

  - name: Prometheus
    uid: prometheus-dgst
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    uid: postgres-dgst
    type: postgres
    access: proxy
    url: ${GRAFANA_PG_HOST}
    user: ${GRAFANA_PG_USER}
    database: ${GRAFANA_PG_DB}
    editable: true
    jsonData:
      postgresVersion: 1800
      sslmode: disable
      timescaledb: false
    secureJsonData:
      password: ${GRAFANA_PG_PASSWORD}
