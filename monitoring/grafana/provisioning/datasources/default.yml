apiVersion: 1

# Grafana Alerting provisioning에서 datasourceUid 로 참조합니다.
# URL은 docker-compose / 환경에 맞게 수정하세요.
datasources:
  - name: Loki
    uid: loki-dgst
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

  - name: Prometheus
    uid: prometheus-dgst
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
