apiVersion: 1

# provisioning/alerting/contact_points.yml — examples 와 동일 내용
contactPoints:
  - orgId: 1
    name: telegram-dgst
    receivers:
      - uid: dgst-telegram
        type: telegram
        disableResolveMessage: false
        settings:
          bottoken: '$TELEGRAM_BOT_TOKEN'
          chatid: '$TELEGRAM_CHAT_ID'
          message_thread_id: '$TELEGRAM_MESSAGE_THREAD_ID'
          message: |
            {{ template "default.message" . }}
